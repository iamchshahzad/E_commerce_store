{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="E-Shop — Premium online store with the best products at amazing prices.">
    <title>{% block title %}E-Shop — Premium Store{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Apply saved theme before paint to eliminate flash -->
    <script>
        (function () {
            var key = 'eshop-theme';
            var fallback = 'light';
            var theme = fallback;
            try {
                var saved = localStorage.getItem(key);
                if (saved === 'light' || saved === 'dark') {
                    theme = saved;
                }
            } catch (e) {
                theme = fallback;
            }
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>

<body>

    <nav class="navbar">
        <a href="{% url 'product_list' %}" class="navbar-brand">&#9889; E-Shop</a>

        <!-- Hamburger button (mobile) -->
        <button class="hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <ul class="navbar-nav" id="navbar-nav">
            <li><a href="{% url 'product_list' %}" class="nav-link">&#127968; Home</a></li>
            <li><a href="{% url 'cart_detail' %}" class="nav-link">&#128722; Cart</a></li>
            <li><a href="{% url 'admin:index' %}" class="nav-link">&#9881; Admin</a></li>
        </ul>

        <!-- Dark / Light mode toggle -->
        <button class="theme-toggle" id="theme-toggle" aria-label="Switch to dark mode" title="Toggle theme"
            type="button">
            <span class="theme-toggle__track">
                <span class="theme-toggle__thumb"></span>
            </span>
            <span class="theme-toggle__icon theme-toggle__icon--sun">&#9728;</span>
            <span class="theme-toggle__icon theme-toggle__icon--moon">&#9790;</span>
            <span class="theme-toggle__label" id="theme-toggle-label">Light</span>
        </button>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <footer class="footer">
        <p>&copy; 2026 <strong>E-Shop</strong>. Crafted with &#10084; &mdash; All rights reserved.</p>
    </footer>

    <script>
        // ---- Hamburger menu ----
        const hamburger = document.getElementById('hamburger');
        const nav = document.getElementById('navbar-nav');
        if (hamburger && nav) {
            hamburger.addEventListener('click', () => {
                const isOpen = nav.classList.toggle('open');
                hamburger.classList.toggle('open', isOpen);
                hamburger.setAttribute('aria-expanded', String(isOpen));
            });
            nav.querySelectorAll('.nav-link').forEach((link) => {
                link.addEventListener('click', () => {
                    nav.classList.remove('open');
                    hamburger.classList.remove('open');
                    hamburger.setAttribute('aria-expanded', 'false');
                });
            });
        }

        // ---- Dark / Light mode toggle ----
        const root = document.documentElement;
        const themeBtn = document.getElementById('theme-toggle');
        const themeLabel = document.getElementById('theme-toggle-label');
        const STORAGE_KEY = 'eshop-theme';

        function applyTheme(theme) {
            root.setAttribute('data-theme', theme);
            try {
                localStorage.setItem(STORAGE_KEY, theme);
            } catch (e) { }

            if (themeBtn) {
                themeBtn.setAttribute(
                    'aria-label',
                    theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'
                );
                themeBtn.classList.toggle('is-light', theme === 'light');
            }

            if (themeLabel) {
                themeLabel.textContent = theme === 'dark' ? 'Dark' : 'Light';
            }
        }

        // Init from saved preference (already set in <head> to avoid flash)
        let initialTheme = 'light';
        try {
            const savedTheme = localStorage.getItem(STORAGE_KEY);
            if (savedTheme === 'light' || savedTheme === 'dark') {
                initialTheme = savedTheme;
            }
        } catch (e) { }
        applyTheme(initialTheme);

        if (themeBtn) {
            themeBtn.addEventListener('click', () => {
                const currentTheme = root.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
                const nextTheme = currentTheme === 'dark' ? 'light' : 'dark';
                applyTheme(nextTheme);
            });
        }
    </script>

</body>

</html>
