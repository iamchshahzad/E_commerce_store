{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}E-Commerce Store{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <a href="{% url 'product_list' %}" class="navbar-brand">E-Shop</a>
        <ul class="navbar-nav">
            <li><a href="{% url 'product_list' %}" class="nav-link">Home</a></li>
            <li><a href="{% url 'cart_detail' %}" class="nav-link">Cart</a></li>
            <li><a href="{% url 'admin:login' %}" class="nav-link">Login</a></li>
        </ul>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <footer class="footer">
        <p>&copy; 2026 E-Commerce Store. All rights reserved.</p>
    </footer>

</body>
</html>
